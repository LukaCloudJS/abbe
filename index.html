<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oi gatinha... 🐾</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe6f2, #fff0f5, #f8e1e9);
      font-family: "Segoe UI", "Poppins", sans-serif;
      color: #333;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
      transition: opacity 0.6s ease, transform 0.6s ease;
      opacity: 0;
      transform: scale(0.92);
      pointer-events: none;
    }

    .screen.active {
      opacity: 1;
      transform: scale(1);
      pointer-events: all;
    }

    h1, .main-text {
      font-size: 2.1rem;
      color: #ff5e9e;
      margin-bottom: 1.8rem;
      line-height: 1.3;
      text-shadow: 0 2px 10px rgba(255, 105, 180, 0.3);
      animation: heartBeat 3s infinite ease-in-out;
    }

    .buttons {
      display: flex;
      gap: 40px;
      margin-top: 30px;
    }

    button {
      padding: 16px 42px;
      font-size: 1.3rem;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    .yes {
      background: #ff79b9;
      color: white;
    }

    .yes:hover {
      background: #ff4da6;
      transform: translateY(-6px) scale(1.08);
      box-shadow: 0 12px 30px rgba(255, 105, 180, 0.5);
    }

    .no {
      background: #a3a3a3;
      color: white;
    }

    .no:hover {
      background: #888;
      transform: translateY(-3px);
    }

    .sad-heart, .happy-heart {
      font-size: 5.5rem;
      margin: 20px 0;
      animation: risex 4s ease-in-out, float 2s ease-in-out infinite 4s;
    }

    .sad-heart { color: #b19cd9; }
    .happy-heart { color: #ff4da6; }

    .small-hearts {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .heart {
      position: absolute;
      font-size: 1.8rem;
      color: #ff9ec4;
      opacity: 0;
      animation: rise 6s linear infinite;
    }

    @keyframes rise {
      0%   { transform: translateY(120vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.9; }
      90%  { opacity: 0.9; }
      100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
    }

    @keyframes risex {
      0%   { transform: translateY(120vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.9; }
      80%  { transform: translateY(-20vh) rotate(360deg); opacity: 0.9; }
      100% { transform: translateY(0) rotate(360deg); opacity: 1; }
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.08); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-10deg); }
      50%      { transform: translateY(-20px) rotate(10deg); }
    }

    @media (max-width: 500px) {
      h1, .main-text { font-size: 1.8rem; }
      button { padding: 14px 36px; font-size: 1.15rem; }
      .buttons { gap: 25px; }
    }
  </style>
</head>
<body>

<div class="small-hearts" id="hearts"></div>

<div class="screen active" id="screen1">
  <h1>Oi Gatinha :3</h1>
  <p class="main-text">Manda uma fotinha sua pls ♡</p>
  
  <div class="buttons">
    <button class="yes" onclick="goToScreen(2)">Ta bom</button>
    <button class="no" onclick="goToScreen(3)">NÃO!</button>
  </div>
</div>

<div class="screen" id="screen2">
  <div class="happy-heart">♡(>ᴗ<)♡</div>
  <h1 style="color:#ff4da6">Yaaayyyyyy!!!</h1>
  <p class="main-text" style="font-size:1.6rem; color:#e0458f;">
    Manda no meu pv gatinha...<br>
    te amo muito ta ♡</p>
</div>

<div class="screen" id="screen3">
  <div class="sad-heart">(｡•́︿•̀｡)</div>
  <h1 style="color:#b19cd9">Ahhhhh :(</h1>
  <p class="main-text" style="color:#9575cd;">
    na próxima eu consigo...<br>
    não desisto de você não, viu? ♡
  </p>
</div>

<script>
function goToScreen(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen' + n).classList.add('active');
  
  if (n === 2) {
    createHearts(40);
  }
}

function createHearts(qtd) {
  const container = document.getElementById('hearts');
  for(let i = 0; i < qtd; i++) {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = ['♡','💗','💖','✧','♡'][Math.floor(Math.random()*5)];
    heart.style.left = Math.random() * 100 + 'vw';
    heart.style.animationDuration = (5 + Math.random() * 7) + 's';
    heart.style.animationDelay = Math.random() * 3 + 's';
    container.appendChild(heart);
    
    setTimeout(() => heart.remove(), 14000);
  }
}

setInterval(() => {
  if (document.getElementById('screen1').classList.contains('active')) {
    createHearts(3);
  }
}, 3000);
</script>

</body>
</html>
